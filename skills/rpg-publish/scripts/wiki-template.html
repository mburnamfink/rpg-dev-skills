<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title$</title>
<style>
  :root{
    --bg:#f7f5f0; --panel:#fffdf8; --ink:#211c17; --muted:#6b625a;
    --rule:#ddd6ca; --accent:#7a4a2b; --link:#8a3b1e;
    --gm-bg:#efe7f4; --gm-edge:#8a5cb0; --gm-ink:#4a2f66;
    --read-bg:#f0ede4; --read-edge:#3f6f5a;
    --prep-bg:#fbf6ea; --prep-edge:#b8892f;
    --player-bg:#eaf1ec;
    --maxw:52rem; --nav:19rem;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#171512; --panel:#201d18; --ink:#e9e3d8; --muted:#a49a8c;
      --rule:#38322a; --accent:#d9a066; --link:#e0a878;
      --gm-bg:#2a2233; --gm-edge:#9b74c4; --gm-ink:#d7c3ef;
      --read-bg:#1e231f; --read-edge:#5f9a80;
      --prep-bg:#26210f; --prep-edge:#c79a3d;
      --player-bg:#1a231d;
    }
  }
  :root[data-theme="light"]{
    --bg:#f7f5f0; --panel:#fffdf8; --ink:#211c17; --muted:#6b625a;
    --rule:#ddd6ca; --accent:#7a4a2b; --link:#8a3b1e;
    --gm-bg:#efe7f4; --gm-edge:#8a5cb0; --gm-ink:#4a2f66;
    --read-bg:#f0ede4; --read-edge:#3f6f5a;
    --prep-bg:#fbf6ea; --prep-edge:#b8892f; --player-bg:#eaf1ec;
  }
  :root[data-theme="dark"]{
    --bg:#171512; --panel:#201d18; --ink:#e9e3d8; --muted:#a49a8c;
    --rule:#38322a; --accent:#d9a066; --link:#e0a878;
    --gm-bg:#2a2233; --gm-edge:#9b74c4; --gm-ink:#d7c3ef;
    --read-bg:#1e231f; --read-edge:#5f9a80;
    --prep-bg:#26210f; --prep-edge:#c79a3d; --player-bg:#1a231d;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.6 "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    -webkit-text-size-adjust:100%;
  }

  /* --- layout --- */
  .wrap{display:flex; align-items:flex-start;}
  nav#TOC{
    position:sticky; top:0; align-self:flex-start;
    width:var(--nav); height:100vh; overflow-y:auto; flex:0 0 var(--nav);
    background:var(--panel); border-right:1px solid var(--rule); padding:1.1rem 1rem 3rem;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-size:.82rem;
  }
  nav#TOC ul{list-style:none; margin:0; padding:0;}
  nav#TOC > ul > li > ul{padding-left:.35rem;}
  nav#TOC ul ul{padding-left:.7rem; border-left:1px solid var(--rule); margin:.15rem 0 .3rem;}
  nav#TOC li{margin:.12rem 0;}
  nav#TOC a{color:var(--muted); text-decoration:none; display:block; padding:.12rem .3rem; border-radius:4px;}
  nav#TOC a:hover{color:var(--ink); background:color-mix(in srgb, var(--accent) 12%, transparent);}
  nav#TOC > ul > li > a{color:var(--ink); font-weight:600; margin-top:.5rem;}

  main{flex:1 1 auto; min-width:0; padding:2.2rem clamp(1rem,4vw,3rem) 6rem;}
  .content{max-width:var(--maxw); margin:0 auto;}

  /* --- controls --- */
  .controls{
    position:fixed; top:.7rem; right:.9rem; z-index:20; display:flex; gap:.5rem;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  .controls button{
    font:inherit; font-size:.8rem; font-weight:600; cursor:pointer;
    background:var(--panel); color:var(--ink); border:1px solid var(--rule);
    border-radius:999px; padding:.4rem .8rem; box-shadow:0 1px 3px rgba(0,0,0,.12);
  }
  .controls button:hover{border-color:var(--accent);}
  #viewBtn[data-mode="player"]{background:var(--accent); color:#fff; border-color:var(--accent);}

  /* --- typography --- */
  h1,h2,h3,h4{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; line-height:1.2; color:var(--ink);}
  h1{font-size:2rem; margin:.2rem 0 1.4rem; letter-spacing:-.01em;}
  h2{font-size:1.5rem; margin:2.4rem 0 .8rem; padding-bottom:.3rem; border-bottom:2px solid var(--rule);}
  h3{font-size:1.18rem; margin:1.8rem 0 .5rem; color:var(--accent);}
  h4{font-size:1rem; margin:1.2rem 0 .4rem;}
  a{color:var(--link);}
  p,li{overflow-wrap:break-word;}
  hr{border:none; border-top:1px solid var(--rule); margin:2rem 0;}
  code{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace; font-size:.88em;
    background:color-mix(in srgb, var(--ink) 8%, transparent); padding:.1em .35em; border-radius:4px;}

  /* --- tables (Choices -> consequence, etc.) --- */
  .content table{border-collapse:collapse; width:100%; margin:1rem 0; font-size:.95rem;}
  .content th,.content td{border:1px solid var(--rule); padding:.45rem .6rem; text-align:left; vertical-align:top;}
  .content thead th{background:color-mix(in srgb, var(--accent) 12%, transparent);}
  .table-scroll,.content > div:has(> table){overflow-x:auto;}

  /* --- callouts --- */
  .callout{margin:1rem 0; padding:.7rem 1rem; border-radius:6px; border-left:4px solid var(--rule);}
  .callout > :first-child{margin-top:0;} .callout > :last-child{margin-bottom:0;}
  .callout.read-aloud{
    background:var(--read-bg); border-left-color:var(--read-edge);
    font-style:italic; font-size:1.05rem;
  }
  .callout.read-aloud strong:first-child{font-style:normal;}
  .callout.prep{background:var(--prep-bg); border-left-color:var(--prep-edge); font-size:.95rem;}

  /* --- audience wall --- */
  .gm{
    background:var(--gm-bg); border-left:3px solid var(--gm-edge);
    padding:.5rem .8rem; border-radius:4px; margin:.6rem 0; position:relative;
  }
  .gm::before{
    content:"GM"; position:absolute; top:.3rem; right:.5rem; font-size:.6rem; font-weight:700;
    letter-spacing:.06em; color:var(--gm-ink); opacity:.7;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  span.gm{padding:.05em .3em; margin:0; border-left:none; border-radius:3px;}
  span.gm::before{display:none;}
  section.player > h1::after, section.player > h2::after, section.player > h3::after{
    content:"players"; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    font-size:.55rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    vertical-align:middle; margin-left:.6em; padding:.15em .5em; border-radius:999px;
    background:var(--player-bg); color:var(--muted); border:1px solid var(--rule);
  }

  /* --- Player view: hide everything the wall keeps from players --- */
  body.player-view .gm,
  body.player-view .callout.prep,
  body.player-view section:not(.player) > .level3.gm,
  body.player-view section.level2:not(.player),
  body.player-view section.level1:not(.player) > section.level2:not(.player){display:none !important;}
  body.player-view nav#TOC a.gm-nav{display:none;}
  body.player-view section.player > h2::after,
  body.player-view section.player > h3::after{content:none;}

  @media (max-width:820px){
    :root{--nav:0;}
    nav#TOC{position:fixed; inset:0 auto 0 0; transform:translateX(-100%); transition:transform .2s; z-index:30; width:16rem; flex-basis:16rem;}
    body.nav-open nav#TOC{transform:none; box-shadow:0 0 40px rgba(0,0,0,.4);}
    main{padding-top:3.4rem;}
  }
</style>
</head>
<body>
<div class="controls">
  <button id="navBtn" hidden title="Table of contents">☰</button>
  <button id="viewBtn" data-mode="gm" title="Toggle the GM / Player audience wall">GM view</button>
  <button id="themeBtn" title="Toggle light / dark">◐</button>
</div>
<div class="wrap">
$if(toc)$
<nav id="TOC" role="doc-toc">
$table-of-contents$
</nav>
$endif$
<main>
<div class="content">
$body$
</div>
</main>
</div>
<script>
(function(){
  var root=document.documentElement, body=document.body;

  // theme
  var savedTheme=localStorage.getItem('rpgwiki-theme');
  if(savedTheme) root.setAttribute('data-theme',savedTheme);
  document.getElementById('themeBtn').addEventListener('click',function(){
    var cur=root.getAttribute('data-theme');
    if(!cur) cur=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
    var next=cur==='dark'?'light':'dark';
    root.setAttribute('data-theme',next);
    localStorage.setItem('rpgwiki-theme',next);
  });

  // Tag TOC links that point at GM-only sections, so Player view can drop them.
  function markGmNav(){
    var links=document.querySelectorAll('nav#TOC a[href^="#"]');
    links.forEach(function(a){
      var id=decodeURIComponent(a.getAttribute('href').slice(1));
      var el=document.getElementById(id);
      var sec=el&&el.closest('section');
      // A nav entry is GM-only when its target section (or an ancestor) is not .player.
      var gm=false, node=sec;
      while(node&&node.matches&&node.matches('section')){
        if(node.classList.contains('player')){gm=false;break;}
        if(node.classList.contains('level2')||node.classList.contains('level3')) gm=true;
        node=node.parentElement.closest('section');
      }
      if(gm) a.classList.add('gm-nav');
    });
  }
  markGmNav();

  // audience wall
  var viewBtn=document.getElementById('viewBtn');
  function setView(mode){
    var player=mode==='player';
    body.classList.toggle('player-view',player);
    viewBtn.dataset.mode=mode;
    viewBtn.textContent=player?'Player view':'GM view';
    localStorage.setItem('rpgwiki-view',mode);
  }
  setView(localStorage.getItem('rpgwiki-view')||'gm');
  viewBtn.addEventListener('click',function(){
    setView(viewBtn.dataset.mode==='player'?'gm':'player');
  });

  // mobile nav
  var navBtn=document.getElementById('navBtn');
  if(document.getElementById('TOC')){
    navBtn.hidden=false;
    navBtn.addEventListener('click',function(){body.classList.toggle('nav-open');});
    document.querySelectorAll('nav#TOC a').forEach(function(a){
      a.addEventListener('click',function(){body.classList.remove('nav-open');});
    });
  }
})();
</script>
</body>
</html>
